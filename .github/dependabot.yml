version: 2
updates:
  # NPM-Dependencies (Tailwind, PostCSS, autoprefixer)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Composer-Dependencies (PHPCS, PHPStan, rb-wp-shared)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "composer"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions selbst
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
